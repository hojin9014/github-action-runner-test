name: Deploy to GCP Tomcat

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on:
      - self-hosted
      - Linux
      - x64
      - deploy

    env:
      APP_WAR: nice-poc.war
      DEPLOY_WAR: ROOT.war
      TOMCAT_SERVICE: tomcat10
      TOMCAT_WEBAPPS: /var/lib/tomcat10/webapps
      REMOTE_WAR: /tmp/nice-poc.war

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check runner environment
        run: |
          hostname
          whoami
          pwd
          java -version
          mvn -version
          ssh -V

      - name: Run tests
        run: |
          mvn -B clean test

      - name: Build WAR
        run: |
          mvn -B package -DskipTests
          test -f "target/$APP_WAR"
          ls -al target

      - name: Configure SSH
        env:
          WAS_HOST: ${{ secrets.WAS_HOST }}
          WAS_PORT: ${{ secrets.WAS_PORT }}
          WAS_SSH_KEY: ${{ secrets.WAS_SSH_KEY }}
        run: |
          set -eu
          WAS_PORT="${WAS_PORT:-22}"

          test -n "$WAS_HOST"
          test -n "$WAS_SSH_KEY"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$WAS_SSH_KEY" > ~/.ssh/was_deploy_key
          chmod 600 ~/.ssh/was_deploy_key
          ssh-keyscan -p "$WAS_PORT" -H "$WAS_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Verify WAS connection
        env:
          WAS_HOST: ${{ secrets.WAS_HOST }}
          WAS_PORT: ${{ secrets.WAS_PORT }}
          WAS_USER: ${{ secrets.WAS_USER }}
        run: |
          set -eu
          WAS_PORT="${WAS_PORT:-22}"
          test -n "$WAS_HOST"
          test -n "$WAS_USER"

          ssh -i ~/.ssh/was_deploy_key \
            -p "$WAS_PORT" \
            -o IdentitiesOnly=yes \
            "$WAS_USER@$WAS_HOST" \
            'hostname && whoami'

      - name: Upload WAR to WAS
        env:
          WAS_HOST: ${{ secrets.WAS_HOST }}
          WAS_PORT: ${{ secrets.WAS_PORT }}
          WAS_USER: ${{ secrets.WAS_USER }}
        run: |
          set -eu
          WAS_PORT="${WAS_PORT:-22}"

          scp -i ~/.ssh/was_deploy_key \
            -P "$WAS_PORT" \
            -o IdentitiesOnly=yes \
            "target/$APP_WAR" \
            "$WAS_USER@$WAS_HOST:$REMOTE_WAR"

      - name: Deploy WAR on WAS
        env:
          WAS_HOST: ${{ secrets.WAS_HOST }}
          WAS_PORT: ${{ secrets.WAS_PORT }}
          WAS_USER: ${{ secrets.WAS_USER }}
        run: |
          set -eu
          WAS_PORT="${WAS_PORT:-22}"

          ssh -i ~/.ssh/was_deploy_key \
            -p "$WAS_PORT" \
            -o IdentitiesOnly=yes \
            "$WAS_USER@$WAS_HOST" \
            "set -e
             sudo -n /usr/bin/systemctl stop '$TOMCAT_SERVICE'
             sudo -n /usr/bin/rm -f '$TOMCAT_WEBAPPS/$DEPLOY_WAR'
             sudo -n /usr/bin/rm -rf '$TOMCAT_WEBAPPS/ROOT'
             sudo -n /usr/bin/cp '$REMOTE_WAR' '$TOMCAT_WEBAPPS/$DEPLOY_WAR'
             sudo -n /usr/bin/chown tomcat:tomcat '$TOMCAT_WEBAPPS/$DEPLOY_WAR' || true
             sudo -n /usr/bin/systemctl start '$TOMCAT_SERVICE'
             systemctl is-active '$TOMCAT_SERVICE'
             ls -al '$TOMCAT_WEBAPPS'"
